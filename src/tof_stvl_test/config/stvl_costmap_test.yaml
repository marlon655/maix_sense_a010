local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.26, -0.25], [0.26, 0.25], [-0.26, 0.25], [-0.26, -0.25]]"
      plugins: ["stvl_layer", "inflation_layer"]
      always_send_full_costmap: true

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 10.0
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 0.5
        mapping_mode: false
        map_save_duration: 60.0
        observation_sources: pointcloud
        pointcloud:
          data_type: PointCloud2
          topic: /ground_segmentation/obstacle_points
          marking: true
          clearing: false
          obstacle_range: 2.5
          min_obstacle_height: -0.05
          max_obstacle_height: 1.6
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "passthrough"
          voxel_min_points: 0
          clear_after_reading: true
          max_z: 1.0
          min_z: 0.2
          vertical_fov_angle: 1.047
          horizontal_fov_angle: 1.22
          decay_acceleration: 10.0
          model_type: 0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.25
        cost_scaling_factor: 5.0
